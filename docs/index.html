<!doctype html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>medil.ai1 - Drug Information and Clinical Tools</title>

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  font-family: Arial, Helvetica, sans-serif;
  background: #031221;
  color: white;
  overflow: hidden;
}

.hero {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #031221;
}

/* Base Image Layer (Z-index 1) */
.hero img.bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 1;
}

/* Background Video Layer (Z-index 2) - Hidden initially */
.hero video.bg-video {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 2;
  opacity: 0; 
  transition: opacity 1.5s ease-in-out; 
}

/* Fade in the video when ready */
.hero video.bg-video.ready {
  opacity: 1; 
}

/* CSS Animation Overlay (Z-index 3) */
.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  transition: opacity 1.5s ease-in-out; /* Matches video fade-in speed */
}

/* Disables animations and hides the static overlays once the video takes over */
.hero.video-active .overlay {
  opacity: 0;
}
.hero.video-active .overlay * {
  animation: none !important;
}

/* Text boxes (Z-index 20) */
.content-wrap {
  position: absolute;
  z-index: 20;
  left: 4vw;
  right: 4vw;
  bottom: 6vh;
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  pointer-events: auto;
}

.content {
  width: min(44vw, 640px);
  padding: 24px 30px;
  border-radius: 26px;
  background: rgba(3, 18, 33, 0.56);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  
  /* ADDED: Base border & crisp transitions for a smooth animation feel */
  border: 1px solid rgba(0, 160, 255, 0.15);
  box-shadow: 0 0 35px rgba(0, 160, 255, 0.25);
  transition: background 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
              border-color 0.4s cubic-bezier(0.25, 1, 0.5, 1), 
              box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1);
}

/* ADDED: Exciting tech-hover interactive states */
.content:hover {
  background: rgba(4, 28, 51, 0.75);
  border-color: rgba(0, 195, 255, 0.8);
  box-shadow: 0 0 50px rgba(0, 160, 255, 0.45), 
              inset 0 0 15px rgba(0, 195, 255, 0.2);
  cursor: default;
}

/* Extra hover accentuation specifically for the call-to-action block */
.content.contact:hover {
  cursor: pointer;
  border-color: rgba(255, 255, 255, 0.9);
  box-shadow: 0 0 45px rgba(255, 255, 255, 0.35);
}

.content.en {
  direction: ltr;
  text-align: left;
  transform: translateY(-34px);
}

.content.contact {
  width: fit-content;
  min-width: unset;
  max-width: 90vw;
  padding: 12px 18px;
  align-self: center;
  direction: ltr;
  text-align: center;
  display: inline-block;
  white-space: nowrap;
}

.content.he {
  direction: rtl;
  text-align: right;
}

h1 {
  margin: 0 0 12px;
  font-size: clamp(24px, 2.4vw, 32px);
  line-height: 1.1;
}

h2 {
  margin: 0 0 16px;
  font-size: clamp(16px, 1.6vw, 23px);
  font-weight: 300;
  color: #d8f3ff;
}

p {
  margin: 0 0 12px;
  font-size: clamp(14px, 1.2vw, 19px);
  line-height: 1.45;
}

.contact {
  display: block;
  margin: 0;
  padding: 0;
  line-height: 1.45;
  font-size: clamp(14px, 1.2vw, 18px);
  direction: ltr;
  text-align: center;
}

.contact a {
  color: #ffffff;
  text-decoration: none;
  border-bottom: 1px solid rgba(255,255,255,.6);
}

/* Network pulses */
.pulse {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: rgba(130, 220, 255, .95);
  box-shadow: 0 0 22px 8px rgba(70, 190, 255, .7);
  animation: pulse 2.8s ease-in-out infinite;
}

.p1 { left: 47%; top: 22%; animation-delay: 0s; }
.p2 { left: 58%; top: 39%; animation-delay: .7s; }
.p3 { left: 43%; top: 57%; animation-delay: 1.2s; }
.p4 { left: 72%; top: 30%; animation-delay: 1.8s; }

@keyframes pulse {
  0%, 100% { transform: scale(.65); opacity: .4; }
  50% { transform: scale(1.5); opacity: 1; }
}

/* Globe rotation illusion */
.globe-shine {
  position: absolute;
  left: 29%;
  top: 7%;
  width: 42%;
  height: 62%;
  border-radius: 50%;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.05) 38%, rgba(255,255,255,.28) 50%, rgba(255,255,255,.05) 62%, transparent 100%);
  mix-blend-mode: screen;
  animation: globeSpin 7s linear infinite;
}

@keyframes globeSpin {
  from { transform: translateX(-20%) rotate(0deg); opacity: .15; }
  50% { opacity: .58; }
  to { transform: translateX(20%) rotate(360deg); opacity: .15; }
}

/* Leaves wind */
.leaf-wind {
  position: absolute;
  left: -5%;
  top: 0;
  width: 30%;
  height: 36%;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 35%, rgba(180,255,120,.18), transparent 55%);
  animation: wind 4.2s ease-in-out infinite;
}

@keyframes wind {
  0%, 100% { transform: translateX(0) rotate(0deg); opacity: .22; }
  50% { transform: translateX(22px) rotate(2.5deg); opacity: .58; }
}

/* Device screen animations */
.screen-glow {
  position: absolute;
  border-radius: 18px;
  overflow: hidden;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 2px, transparent 2px 12px),
    linear-gradient(120deg, transparent, rgba(255,255,255,.28), transparent);
  background-size: 100% 100%, 240% 100%;
  mix-blend-mode: screen;
  animation: screenMove 3s linear infinite;
}

.laptop-screen {
  left: 5.5%;
  bottom: 20%;
  width: 30%;
  height: 28%;
  transform: perspective(500px) rotateX(2deg) rotateZ(1deg);
}

.phone-screen {
  left: 39%;
  bottom: 9%;
  width: 24%;
  height: 14%;
  border-radius: 26px;
}

@keyframes screenMove {
  from { background-position: 0 0, 220% 0; opacity: .16; }
  50% { opacity: .58; }
  to { background-position: 80px 0, -80% 0; opacity: .16; }
}

/* DNA spin */
.dna-spin {
  position: absolute;
  right: 20%;
  top: 16%;
  width: 8%;
  height: 20%;
  border-radius: 50%;
  border-left: 3px solid rgba(180,235,255,.55);
  border-right: 3px solid rgba(180,235,255,.55);
  box-shadow: 0 0 22px rgba(90,190,255,.55);
  animation: dnaSpin 4s linear infinite;
}

.dna-spin::before,
.dna-spin::after {
  content: "";
  position: absolute;
  left: 12%;
  right: 12%;
  height: 2px;
  background: rgba(220,245,255,.75);
  box-shadow: 0 0 10px rgba(120,210,255,.9);
}

.dna-spin::before { top: 34%; transform: rotate(18deg); }
.dna-spin::after { top: 64%; transform: rotate(-18deg); }

@keyframes dnaSpin {
  from { transform: rotateY(0deg) rotateZ(0deg); }
  to { transform: rotateY(360deg) rotateZ(360deg); }
}

/* Beating heart overlay */
.heart-overlay {
  position: absolute;
  left: 16.5%;
  top: 16.5%;
  width: 11vw;
  height: 10vw;
  min-width: 95px;
  min-height: 86px;
  max-width: 180px;
  max-height: 160px;
  filter: drop-shadow(0 0 18px rgba(255,255,255,.8));
  animation: heartBeat 1.12s ease-in-out infinite;
}

.heart-shape {
  position: absolute;
  inset: 12%;
  background: rgba(255, 255, 255, .18);
  transform: rotate(-45deg);
  border-radius: 0 0 18% 18%;
  box-shadow: inset 0 0 24px rgba(255,255,255,.35), 0 0 24px rgba(255,255,255,.22);
}

.heart-shape::before,
.heart-shape::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(255,255,255,.18);
  border-radius: 50%;
}

.heart-shape::before { top: -50%; left: 0; }
.heart-shape::after { top: 0; left: 50%; }

.heart-ecg {
  position: absolute;
  left: 10%;
  top: 48%;
  width: 80%;
  height: 28%;
  overflow: hidden;
}

.heart-ecg svg {
  position: absolute;
  width: 220%;
  height: 100%;
  left: -110%;
  animation: ecgFlow 1.55s linear infinite;
}

.heart-ecg path {
  fill: none;
  stroke: rgba(255,255,255,.95);
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px white);
}

@keyframes heartBeat {
  0%, 100% { transform: scale(1); opacity: .42; }
  18% { transform: scale(1.14); opacity: .9; }
  32% { transform: scale(.98); opacity: .62; }
  48% { transform: scale(1.08); opacity: .82; }
}

@keyframes ecgFlow {
  from { transform: translateX(0); }
  to { transform: translateX(50%); }
}

/* Media Queries */
@media screen and (orientation: portrait),
screen and (max-aspect-ratio: 1/1),
screen and (max-width: 900px) {

  .content-wrap {
    left: 4vw;
    right: 4vw;
    top: 52vh;
    bottom: auto;
    max-height: 46vh;
    overflow-y: auto;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    padding-bottom: 10px;
  }

  .content {
    width: 100%;
    padding: 11px 15px;
    border-radius: 18px;
  }

  .content.he {
    order: 1;
  }

  .content.contact {
    width: fit-content;
    max-width: 92vw;
    align-self: center;
    transform: none;
    order: 3;
    padding: 8px 14px;
  }

  .content.en {
    transform: none;
    order: 2;
  }
  
  h1 {
    margin-bottom: 5px;
    font-size: clamp(16px, 4vw, 22px);
    line-height: 1.04;
  }

  h2 {
    margin-bottom: 6px;
    font-size: clamp(12px, 3.2vw, 17px);
    line-height: 1.12;
  }

  p {
    margin-bottom: 5px;
    font-size: clamp(11px, 2.9vw, 14px);
    line-height: 1.2;
  }

  .contact {
    margin-top: 5px;
    font-size: clamp(11px, 2.9vw, 14px);
  }

  .globe-shine {
    left: 18%;
    top: 6%;
    width: 64%;
    height: 44%;
  }

  .laptop-screen {
    display: none;
  }

  .phone-screen {
    left: 66%;
    bottom: 31%;
    width: 24%;
    height: 14%;
  }

  .dna-spin {
    right: 17%;
    top: 28%;
    width: 13%;
    height: 15%;
  }

  .heart-overlay {
    left: 12%;
    top: 23%;
    width: 18vw;
    height: 16vw;
  }
}

@media screen and (max-height: 720px) and (max-width: 900px) {
  .content-wrap {
    top: 46vh;
    max-height: 52vh;
  }

  .content {
    padding: 9px 13px;
  }

  h1 { font-size: clamp(15px, 3.7vw, 20px); }
  h2 { font-size: clamp(11px, 2.9vw, 15px); }
  p { font-size: clamp(10px, 2.6vw, 13px); line-height: 1.16; }
  .contact { font-size: clamp(10px, 2.6vw, 13px); }
}

@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; }
}
</style>
</head>

<body>
<section class="hero" aria-label="MEDIL.AI">

  <picture>
    <source media="(orientation: portrait) or (max-aspect-ratio: 1/1) or (max-width: 900px)" srcset="AA hamapa fullscreen portrait.png">
    <source media="(orientation: landscape)" srcset="AA hamapa fullscreen landscape.png">
    <img class="bg" src="AA hamapa fullscreen landscape.png" alt="MEDIL.AI drug information, clinical tools and digital health solutions">
  </picture>

  <video id="heroVideo" class="bg-video" muted playsinline loop preload="auto"></video>

  <div class="overlay">
    <div class="leaf-wind"></div>
    <div class="globe-shine"></div>

    <div class="screen-glow laptop-screen"></div>
    <div class="screen-glow phone-screen"></div>

    <div class="dna-spin"></div>

    <div class="heart-overlay">
      <div class="heart-shape"></div>
      <div class="heart-ecg">
        <svg viewBox="0 0 600 100" preserveAspectRatio="none" aria-hidden="true">
          <path d="M0 55 L70 55 L88 55 L105 30 L125 78 L148 55 L230 55 L250 55 L268 35 L288 78 L310 55 L390 55 L410 55 L428 30 L448 78 L470 55 L600 55"></path>
        </svg>
      </div>
    </div>

    <div class="pulse p1"></div>
    <div class="pulse p2"></div>
    <div class="pulse p3"></div>
    <div class="pulse p4"></div>
  </div>

  <main class="content-wrap">
	<section class="content contact">
      <div class="contact">
        <h2>Contact:</h2>
        <a href="mailto:support@medil.ai">support@medil.ai</a>
      </div>
    </section>


	<section class="content en">
      <h1>MEDIL.AI</h1>
      <h2>Drug Information, Clinical Tools and Digital Health</h2>
      <p>
        Comprehensive medication information for healthcare professionals and patients.
      </p>
      <p>
        Clinical calculators, decision-support tools and AI-powered digital health solutions.
      </p>
      <p>
        <a href="https://app.medil.co.il" style="color:white;font-weight:bold;text-decoration:none;border-bottom:1px solid rgba(255,255,255,.6);">Visit Medil</a>
      </p>
    </section>
  </main>
</section>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const video = document.getElementById("heroVideo");
    const heroContainer = document.querySelector(".hero");
    
    // 1. Detect Screen Orientation
    const isLandscape = window.matchMedia("(orientation: landscape) and (min-width: 901px) and (min-aspect-ratio: 1/1)").matches;
    
    // 2. Select the correct video file based on orientation
    const videoSource = isLandscape ? "video.mp4" : "video_portrait.mp4";
    
    // 3. Inject the source into the video element
    const sourceEl = document.createElement("source");
    sourceEl.src = videoSource;
    sourceEl.type = "video/mp4";
    video.appendChild(sourceEl);
    
    // Force the browser to start downloading the newly injected source
    video.load();

    // 4. Wait for the video to buffer enough to play smoothly
    video.addEventListener("canplaythrough", function() {
      
      // Attempt to play the video
      video.play().then(() => {
        // Once playback starts, add classes to fade in the video and fade out/disable the CSS overlays
        video.classList.add("ready");
        heroContainer.classList.add("video-active");
      }).catch((error) => {
        console.warn("Autoplay was prevented by the browser:", error);
      });
      
    }, { once: true });
  });
</script>

</body>
</html>
